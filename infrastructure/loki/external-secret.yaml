---
# =============================================================================
# Loki MinIO Credentials — ExternalSecret
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: loki-minio-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: loki-minio-credentials
    creationPolicy: Owner
  data:
    - secretKey: access-key
      remoteRef:
        key: loki/minio
        property: access-key
    - secretKey: secret-key
      remoteRef:
        key: loki/minio
        property: secret-key
