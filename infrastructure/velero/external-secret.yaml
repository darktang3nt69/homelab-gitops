---
# =============================================================================
# Velero MinIO Credentials — ExternalSecret
# =============================================================================
# Syncs MinIO credentials from Vault → k8s Secret for Velero
#
# Velero AWS plugin expects credentials in AWS credentials file format:
#   [default]
#   aws_access_key_id = <key>
#   aws_secret_access_key = <secret>
#
# Store in Vault first (can reuse MinIO root credentials):
#   kubectl exec -it vault-0 -n security -- \
#     vault kv put secret/velero/minio-credentials \
#       access-key=minioadmin \
#       secret-key=<same-password-as-minio>
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: velero-minio-credentials
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: velero-minio-credentials
    creationPolicy: Owner
  data:
    - secretKey: cloud
      remoteRef:
        key: velero/minio-credentials
        property: cloud