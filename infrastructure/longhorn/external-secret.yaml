# =============================================================================
# MinIO Credentials for Longhorn — via External Secrets Operator
# =============================================================================
# ESO pulls MinIO credentials from Vault (same source as MinIO app uses)
# Creates k8s Secret `longhorn-minio-credentials` in longhorn-system namespace
# Longhorn BackupStore references this secret
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: longhorn-minio-credentials
  namespace: longhorn-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: longhorn-minio-credentials
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: minio/root-credentials
        property: root-user
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: minio/root-credentials
        property: root-password
