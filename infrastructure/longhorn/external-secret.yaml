# =============================================================================
# MinIO Credentials for Longhorn — via External Secrets Operator
# =============================================================================
# ESO pulls MinIO credentials from Vault (same source as MinIO app uses)
# Creates k8s Secret `longhorn-minio-credentials` in longhorn-system namespace
# Longhorn BackupStore references this secret
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: longhorn-minio-credentials
  namespace: longhorn-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: longhorn-minio-credentials
    creationPolicy: Owner
    template:
      data:
        AWS_ACCESS_KEY_ID: "{{ .rootUser }}"
        AWS_SECRET_ACCESS_KEY: "{{ .rootPassword }}"
        # Tell Longhorn's AWS SDK to use MinIO instead of real S3
        AWS_ENDPOINTS: "http://minio.storage:9000"
        # Use path-style addressing (MinIO doesn't support virtual-hosted-style)
        VIRTUAL_HOSTED_STYLE_ENABLED: "false"
  data:
    - secretKey: rootUser
      remoteRef:
        key: minio/root-credentials
        property: root-user
    - secretKey: rootPassword
      remoteRef:
        key: minio/root-credentials
        property: root-password