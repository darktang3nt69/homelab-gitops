---
# =============================================================================
# TracingPolicy: Detect Shell Execution
# =============================================================================
# Fires a Tetragon event whenever a shell interpreter is exec'd inside any pod.
# Catches interactive shells spawned by attackers after initial container access.
#
# Observed syscall: execve
# Matched binaries: sh, bash, dash, ash, zsh, fish
# Action: observe only (Post) — review events before switching to Sigkill
# =============================================================================
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: detect-shell-exec
spec:
  kprobes:
    - call: "sys_execve"
      syscall: true
      args:
        - index: 0
          type: "string"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Postfix"
              values:
                - "/bin/sh"
                - "/bin/bash"
                - "/bin/dash"
                - "/bin/ash"
                - "/bin/zsh"
                - "/bin/fish"
                - "/usr/bin/sh"
                - "/usr/bin/bash"
                - "/usr/bin/dash"
                - "/usr/bin/zsh"
                - "/usr/bin/fish"
