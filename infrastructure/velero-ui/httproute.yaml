---
# =============================================================================
# Velero UI — HTTPRoute
# =============================================================================
# URL: velero-ui.k8s.darktang3nt.cloud (Twingate only)
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: velero-ui
  namespace: velero
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Velero UI"
    gethomepage.dev/description: "Kubernetes backup management"
    gethomepage.dev/group: "Backup"
    gethomepage.dev/icon: "velero.png"
    gethomepage.dev/href: "https://velero-ui.k8s.darktang3nt.cloud"
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
  hostnames:
    - "velero-ui.k8s.darktang3nt.cloud"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: velero-ui
          namespace: velero
          port: 3000