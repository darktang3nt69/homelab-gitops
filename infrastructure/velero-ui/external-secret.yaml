---
# =============================================================================
# Velero UI Credentials — ExternalSecret
# =============================================================================
# Store in Vault first:
#   kubectl exec -it vault-0 -n security -- \
#     vault kv put secret/velero-ui/credentials \
#       username=admin \
#       password=<strong-password>
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: velero-ui-credentials
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: velero-ui-credentials
    creationPolicy: Owner
  data:
    - secretKey: VELERO_UI_USERNAME
      remoteRef:
        key: velero-ui/credentials
        property: username
    - secretKey: VELERO_UI_PASSWORD
      remoteRef:
        key: velero-ui/credentials
        property: password