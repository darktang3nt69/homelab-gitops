---
# =============================================================================
# LoadBalancer Service for Envoy Gateway
# =============================================================================
# Managed by ArgoCD to preserve MetalLB IP annotation
# Envoy Gateway will auto-reconcile this but won't remove the annotation
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: envoy-envoy-gateway-system-homelab-gateway-00f55f79
  namespace: envoy-gateway-system
  labels:
    app.kubernetes.io/component: proxy
    app.kubernetes.io/managed-by: envoy-gateway
    app.kubernetes.io/name: envoy
    gateway.envoyproxy.io/owning-gateway-name: homelab-gateway
    gateway.envoyproxy.io/owning-gateway-namespace: envoy-gateway-system
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.1.200"
spec:
  type: LoadBalancer
  allocateLoadBalancerNodePorts: true
  externalTrafficPolicy: Local
  internalTrafficPolicy: Cluster
  ipFamilyPolicy: SingleStack
  ipFamilies:
    - IPv4
  selector:
    app.kubernetes.io/component: proxy
    app.kubernetes.io/managed-by: envoy-gateway
    app.kubernetes.io/name: envoy
    gateway.envoyproxy.io/owning-gateway-name: homelab-gateway
    gateway.envoyproxy.io/owning-gateway-namespace: envoy-gateway-system
  ports:
    - name: http-80
      port: 80
      protocol: TCP
      targetPort: 10080
