---
# =============================================================================
# Cilium / Hubble ServiceMonitors
# =============================================================================
# hubble-metrics service (selector: k8s-app=cilium) exposes port 9965
# named "hubble-metrics" — scrapes Hubble metrics from all Cilium agents.
# Cilium operator exposes port 9963 named "prometheus".
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: hubble-metrics
  namespace: kube-system
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: hubble
  namespaceSelector:
    matchNames:
      - kube-system
  endpoints:
    - port: hubble-metrics
      path: /metrics
      interval: 30s

