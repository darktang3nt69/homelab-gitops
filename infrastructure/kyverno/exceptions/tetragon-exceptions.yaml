---
# =============================================================================
# PolicyException: Tetragon
# =============================================================================
# Tetragon is an eBPF-based security observability DaemonSet that requires:
#   - privileged: true       — eBPF programs must be loaded from a privileged ctx
#   - hostPID: true          — must observe all host processes for full coverage
#   - running as root (uid 0) — required for eBPF map access and BPF syscalls
# These are fundamental eBPF requirements; they cannot be removed.
# =============================================================================
apiVersion: kyverno.io/v2beta1
kind: PolicyException
metadata:
  name: tetragon-exceptions
  namespace: tetragon
spec:
  exceptions:
    - policyName: disallow-privileged-containers
      ruleNames:
        - privileged-containers
        - autogen-privileged-containers
    - policyName: disallow-host-namespaces
      ruleNames:
        - host-namespaces
        - autogen-host-namespaces
    - policyName: require-non-root-user
      ruleNames:
        - check-runasnonroot
        - autogen-check-runasnonroot
    - policyName: require-resource-limits
      ruleNames:
        - validate-resources
        - autogen-validate-resources
  match:
    any:
      - resources:
          kinds:
            - Pod
            - DaemonSet
          namespaces:
            - tetragon
