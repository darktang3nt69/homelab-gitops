---
# =============================================================================
# Policy: Require Non-Root User
# =============================================================================
# Requires containers to run as non-root user
# Running as root inside container = root on host if container escapes
#
# Mode: Audit
# =============================================================================
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-non-root-user
  annotations:
    policies.kyverno.io/title: Require Non-Root User
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Containers running as root increase blast radius if compromised.
      This policy requires runAsNonRoot: true or runAsUser > 0.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-runasnonroot
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Containers must not run as root. Set runAsNonRoot: true or runAsUser > 0."
        anyPattern:
          - spec:
              securityContext:
                runAsNonRoot: true
          - spec:
              securityContext:
                runAsUser: ">0"
          - spec:
              containers:
                - securityContext:
                    runAsNonRoot: true
