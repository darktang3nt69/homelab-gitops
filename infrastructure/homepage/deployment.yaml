---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: monitoring
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
    gateway: true

  settings.yaml: |
    title: Homelab
    headerStyle: boxed
    providers:
      longhorn:
        url: http://longhorn-frontend.longhorn-system
    layout:
      Observability:
        style: column
        columns: 1
      GitOps & Infrastructure:
        style: column
        columns: 1
      Security & Storage:
        style: column
        columns: 1
      Backup:
        style: column
        columns: 1

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "thor"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        label: System
        expanded: true
        cpu: true
        memory: true
        cputemp: true
        uptime: true
        refresh: 3000
    - resources:
        label: SSD
        expanded: true
        disk: /mnt/ssd
        diskUnits: bbytes
        refresh: 3000
    - resources:
        label: HDD
        expanded: true
        disk: /mnt/hdd
        diskUnits: bbytes
        refresh: 3000
    - longhorn:
        expanded: true
        total: true
        labels: true
        nodes: true
    - search:
        provider: duckduckgo
        target: _blank

  services.yaml: ""
  bookmarks.yaml: ""
  docker.yaml: ""
  custom.css: ""
  custom.js: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: monitoring
  labels:
    app.kubernetes.io/name: homepage
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      dnsPolicy: ClusterFirst
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
          operator: Exists
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "$(MY_POD_IP):3000,homepage.k8s.darktang3nt.cloud"
            - name: HOMEPAGE_VAR_ARGOCD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homepage-argocd-token
                  key: token
                  optional: true
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - mountPath: /app/config/kubernetes.yaml
              name: homepage-config
              subPath: kubernetes.yaml
            - mountPath: /app/config/settings.yaml
              name: homepage-config
              subPath: settings.yaml
            - mountPath: /app/config/widgets.yaml
              name: homepage-config
              subPath: widgets.yaml
            - mountPath: /app/config/services.yaml
              name: homepage-config
              subPath: services.yaml
            - mountPath: /app/config/bookmarks.yaml
              name: homepage-config
              subPath: bookmarks.yaml
            - mountPath: /app/config/docker.yaml
              name: homepage-config
              subPath: docker.yaml
            - mountPath: /app/config/custom.css
              name: homepage-config
              subPath: custom.css
            - mountPath: /app/config/custom.js
              name: homepage-config
              subPath: custom.js
            - mountPath: /app/config/logs
              name: logs
            - mountPath: /mnt/ssd
              name: disk-ssd
              readOnly: true
            - mountPath: /mnt/hdd
              name: disk-hdd
              readOnly: true
      volumes:
        - name: homepage-config
          configMap:
            name: homepage
        - name: logs
          emptyDir: {}
        - name: disk-ssd
          hostPath:
            path: /mnt/ssd
        - name: disk-hdd
          hostPath:
            path: /mnt/hdd
---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: monitoring
  labels:
    app.kubernetes.io/name: homepage
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: homepage
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
