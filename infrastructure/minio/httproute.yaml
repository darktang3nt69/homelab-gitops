---
# =============================================================================
# MinIO S3 API — HTTPRoute
# =============================================================================
# S3 API endpoint used by Velero + Longhorn for backups
# URL: s3.k8s.darktang3nt.cloud
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: minio-api
  namespace: storage
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
  hostnames:
    - "s3.k8s.darktang3nt.cloud"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: minio
          namespace: storage
          port: 9000
---
# =============================================================================
# MinIO Console — HTTPRoute
# =============================================================================
# MinIO web UI for browsing buckets and managing objects
# URL: minio.k8s.darktang3nt.cloud
# Accessible via Twingate only
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: minio-console
  namespace: storage
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
  hostnames:
    - "minio.k8s.darktang3nt.cloud"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: minio-console
          namespace: storage
          port: 9001
