---
# =============================================================================
# MinIO ServiceMonitor
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: minio
  namespace: storage
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: minio
  namespaceSelector:
    matchNames:
      - storage
  endpoints:
    - port: http
      path: /minio/v2/metrics/cluster
      interval: 30s
