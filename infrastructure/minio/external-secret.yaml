---
# =============================================================================
# MinIO Credentials — ExternalSecret
# =============================================================================
# Syncs MinIO root credentials from Vault → k8s Secret
# MinIO Helm chart reads credentials from this Secret
#
# Before pushing to Git, store credentials in Vault:
#   kubectl exec -it vault-0 -n security -- vault login <token>
#   kubectl exec -it vault-0 -n security -- \
#     vault kv put secret/minio/root-credentials \
#       root-user=minioadmin \
#       root-password=<strong-random-password>
#
# Also create Vault policy for ESO:
#   (ESO already has read access to secret/data/* via external-secrets policy)
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minio-credentials
  namespace: storage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: minio-credentials
    creationPolicy: Owner
  data:
    - secretKey: root-user
      remoteRef:
        key: minio/root-credentials
        property: root-user
    - secretKey: root-password
      remoteRef:
        key: minio/root-credentials
        property: root-password
