---
# =============================================================================
# MinIO Credentials — ExternalSecret
# =============================================================================
# Syncs MinIO root credentials from Vault → k8s Secret
# Official MinIO chart reads: rootUser + rootPassword keys
#
# Store in Vault first:
#   kubectl exec -it vault-0 -n security -- \
#     vault kv put secret/minio/root-credentials \
#       root-user=minioadmin \
#       root-password=<strong-password>
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minio-credentials
  namespace: storage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: minio-credentials
    creationPolicy: Owner
  data:
    - secretKey: rootUser           # key expected by official MinIO chart
      remoteRef:
        key: minio/root-credentials
        property: root-user
    - secretKey: rootPassword       # key expected by official MinIO chart
      remoteRef:
        key: minio/root-credentials
        property: root-password