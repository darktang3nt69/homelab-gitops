---
# =============================================================================
# FreshRSS PVC + Deployment
# =============================================================================
# Persistent storage for FreshRSS data, configuration, and database
# Uses Longhorn for reliable persistent storage
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: freshrss-data
  namespace: freshrss
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshrss
  namespace: freshrss
  labels:
    app.kubernetes.io/name: freshrss
spec:
  replicas: 1
  strategy:
    type: Recreate  # Ensures data consistency during updates
  selector:
    matchLabels:
      app: freshrss
  template:
    metadata:
      labels:
        app: freshrss
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: freshrss
      securityContext:
        fsGroup: 33  # www-data user in the container
        runAsNonRoot: true
        runAsUser: 33
      containers:
        - name: freshrss
          image: freshrss/freshrss:1.25.0
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 33
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            # FreshRSS will use SQLite by default in the data volume
            # For database setup, access the web interface after first deployment
            - name: TZ
              value: "Asia/Kolkata"  # Set your desired timezone
            # Optional: Set admin credentials via environment
            # Uncomment and set if you want to auto-configure
            # - name: FRESHRSS_ADMIN
            #   value: "admin"
            # - name: FRESHRSS_ADMIN_PASSWORD
            #   valueFrom:
            #     secretKeyRef:
            #       name: freshrss-credentials
            #       key: admin-password
          volumeMounts:
            - name: data
              mountPath: /var/www/FreshRSS/data
            - name: config
              mountPath: /var/www/FreshRSS/config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: freshrss-data
        - name: config
          persistentVolumeClaim:
            claimName: freshrss-data
---
apiVersion: v1
kind: Service
metadata:
  name: freshrss
  namespace: freshrss
  labels:
    app.kubernetes.io/name: freshrss
spec:
  type: ClusterIP
  selector:
    app: freshrss
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
