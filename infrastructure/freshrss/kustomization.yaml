---
# =============================================================================
# FreshRSS Kustomization
# =============================================================================
# Combines Helm chart deployment with HTTPRoute for Envoy Gateway
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: freshrss

helmCharts:
  - name: freshrss
    repo: https://k8s-home-lab.github.io/helm-charts
    version: 7.2.1
    releaseName: freshrss
    namespace: freshrss
    valuesInline:
      image:
        repository: ghcr.io/linuxserver/freshrss
        pullPolicy: IfNotPresent
        tag: "1.28.1"

      env:
        TZ: "Asia/Kolkata"
        PUID: "568"
        PGID: "568"

      service:
        main:
          type: ClusterIP
          ports:
            http:
              port: 80
              targetPort: 80
              protocol: TCP

      ingress:
        main:
          enabled: false

      persistence:
        config:
          enabled: true
          storageClass: longhorn
          accessMode: ReadWriteOnce
          size: 10Gi
          mountPath: /config

      podSecurityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        runAsNonRoot: true

      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        runAsNonRoot: true
        runAsUser: 568
        capabilities:
          drop:
            - ALL

      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

      affinity:
        podAntiAffinity: soft

      probes:
        liveness:
          enabled: true
          custom: true
          spec:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
        readiness:
          enabled: true
          custom: true
          spec:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

resources:
  - httproute.yaml
