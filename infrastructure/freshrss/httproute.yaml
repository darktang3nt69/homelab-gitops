---
# =============================================================================
# FreshRSS HTTPRoute — Envoy Gateway
# =============================================================================
# Exposes FreshRSS via Envoy Gateway using Gateway API
# URL: freshrss.k8s.darktang3nt.cloud
#
# This routes traffic to the Service created by the Helm chart.
# Docs: https://gateway-api.sigs.k8s.io/
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: freshrss
  namespace: freshrss
  labels:
    app.kubernetes.io/name: freshrss
spec:
  parentRefs:
    - name: eg
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - "freshrss.k8s.darktang3nt.cloud"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: freshrss
          port: 80
          group: ""
          kind: Service
