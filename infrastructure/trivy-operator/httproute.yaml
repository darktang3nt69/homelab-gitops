apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: trivy-operator
  namespace: trivy-system
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Trivy"
    gethomepage.dev/description: "Kubernetes security vulnerability scanner"
    gethomepage.dev/group: "Security & Storage"
    gethomepage.dev/icon: "https://raw.githubusercontent.com/aquasecurity/trivy/main/docs/imgs/logo.png"
    gethomepage.dev/href: "https://trivy.k8s.darktang3nt.cloud"
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
  hostnames:
    - "trivy.k8s.darktang3nt.cloud"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: trivy-operator
          namespace: trivy-system
          port: 80
