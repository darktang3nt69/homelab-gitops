---
# =============================================================================
# ClusterSecretStore — Vault Backend
# =============================================================================
# Cluster-wide ESO store pointing to Vault
# ClusterSecretStore (not SecretStore) = available across ALL namespaces
# Any namespace can create ExternalSecrets referencing this store
#
# Auth: Kubernetes ServiceAccount tokens
#   ESO pod has a ServiceAccount token
#   Sends token to Vault
#   Vault verifies with k8s API
#   Vault returns scoped token based on ESO's role
#
# Why k8s auth over static tokens:
#   No hardcoded credentials anywhere
#   ServiceAccount IS the identity
#   Tokens are short-lived and auto-rotated by k8s
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      # Vault server address (internal cluster DNS)
      server: "http://vault.security:8200"
      # KV v2 mount path
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          # Vault k8s auth mount path
          mountPath: "kubernetes"
          # Vault role for ESO — must match role created in Vault
          # vault write auth/kubernetes/role/external-secrets ...
          role: "external-secrets"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "security"
---
# =============================================================================
# ExternalSecret — Cloudflare API Token for cert-manager
# =============================================================================
# Syncs Cloudflare API token from Vault → k8s Secret in cert-manager namespace
# cert-manager uses this for DNS-01 challenge (wildcard cert issuance)
#
# Flow:
#   Vault: secret/cloudflare/api-token
#     ↓ ESO reads using k8s auth
#   k8s Secret: cloudflare-api-token in cert-manager namespace
#     ↓ cert-manager ClusterIssuer references this secret
#   Let's Encrypt DNS-01 challenge via Cloudflare API
#     ↓ wildcard cert issued and stored as darktang3nt-tls
#
# Refresh: every 1 hour — keeps secret fresh without manual rotation
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  # refresh secret every hour
  refreshInterval: 1h
  secretStoreRef:
    # reference the ClusterSecretStore above
    name: vault-backend
    kind: ClusterSecretStore
  target:
    # name of k8s Secret to create in cert-manager namespace
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
    - secretKey: api-token          # key in k8s Secret
      remoteRef:
        key: cloudflare/api-token   # path in Vault (under secret/ mount)
        property: api-token         # field within the Vault secret
