---
# =============================================================================
# ArgoCD — HTTPRoute
# =============================================================================
# Exposes ArgoCD UI at argocd.k8s.darktang3nt.cloud
# Accessible via Twingate only (not public)
# TLS terminated at Envoy Gateway using wildcard cert
#
# Note: ArgoCD server must run in insecure mode (--insecure flag) or
# the backend service must be http not https
# argocd-server service port 80 = HTTP (insecure mode)
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "ArgoCD"
    gethomepage.dev/description: "GitOps continuous delivery"
    gethomepage.dev/group: "GitOps & Infrastructure"
    gethomepage.dev/icon: "argo-cd.png"
    gethomepage.dev/href: "https://argocd.k8s.darktang3nt.cloud"
    gethomepage.dev/app: "argocd-server"
    gethomepage.dev/widget.type: "argocd"
    gethomepage.dev/widget.url: "http://argocd-server.argocd.svc.cluster.local:80"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_ARGOCD_TOKEN}}"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: homelab-gateway
      namespace: envoy-gateway-system
  hostnames:
    - "argocd.k8s.darktang3nt.cloud"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: argocd-server
          namespace: argocd
          port: 80
          weight: 1