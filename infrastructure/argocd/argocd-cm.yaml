---
# =============================================================================
# ArgoCD ConfigMap Customizations
# =============================================================================
# Applied manually or via an ArgoCD app watching infrastructure/argocd/
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # Homepage readonly account for service widget
  accounts.homepage: apiKey

  # darktang3nt admin account
  accounts.darktang3nt: login

  # Exclude Cilium runtime objects that are auto-created by the CNI and
  # are not managed via Git — prevents false OutOfSync noise.
  # Exclude Velero runtime objects (Backup, Restore, etc.) that are created
  # dynamically by Velero schedules — not managed via Git.
  resource.exclusions: |
    - apiGroups:
      - cilium.io
      kinds:
      - CiliumIdentity
      - CiliumEndpoint
      clusters:
      - "*"
    - apiGroups:
      - velero.io
      kinds:
      - Backup
      - Restore
      - PodVolumeBackup
      - PodVolumeRestore
      - DeleteBackupRequest
      - DownloadRequest
      - ServerStatusRequest
      clusters:
      - "*"
