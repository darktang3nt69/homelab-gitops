---
# =============================================================================
# Vault HTTPRoute — Envoy Gateway
# =============================================================================
# Exposes Vault UI at vault.k8s.darktang3nt.cloud
# Accessible via Twingate only (not public)
# TLS terminated at Envoy Gateway using wildcard cert
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vault
  namespace: security
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: homelab-gateway
      namespace: envoy-gateway-system
  hostnames:
    - "vault.k8s.darktang3nt.cloud"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: vault-ui
          namespace: security
          port: 8200
          weight: 1
