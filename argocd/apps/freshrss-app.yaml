---
# =============================================================================
# FreshRSS — ArgoCD Application (Helm + Kustomize)
# =============================================================================
# Self-hosted RSS aggregator
# Purpose: Centralized news/feed reader for homelab
# Storage: PVC with Longhorn backend (persistent data)
# Namespace: freshrss
# URL: freshrss.k8s.darktang3nt.cloud
#
# Wave 2: Initial deployment with PVC setup
# Chart: k8s-home-lab/freshrss (7.2.1)
# Image: ghcr.io/linuxserver/freshrss:1.28.1
#
# Docs: https://www.freshrss.org/
# Chart: https://artifacthub.io/packages/helm/k8s-home-lab-repo/freshrss
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: freshrss
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/darktang3nt69/homelab-gitops
    targetRevision: main
    path: infrastructure/freshrss
  destination:
    server: https://kubernetes.default.svc
    namespace: freshrss
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
