---
# =============================================================================
# Loki — ArgoCD Application
# =============================================================================
# Log aggregation — collects logs from all pods via Promtail
# Storage: MinIO loki bucket (long-term) + Longhorn (cache)
# Mode: monolithic (single pod, right-sized for homelab)
# Wave 1: Loki Helm chart
# Wave 2: Config (ExternalSecret + HTTPRoute)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.30.1
    helm:
      values: |
        # monolithic mode — single pod, right for homelab
        deploymentMode: SingleBinary

        loki:
          auth_enabled: false   # single tenant homelab

          commonConfig:
            replication_factor: 1   # single node

          # S3-compatible storage via MinIO
          storage:
            type: s3
            bucketNames:
              chunks: loki
              ruler: loki
              admin: loki
            s3:
              endpoint: http://minio.storage:9000
              region: us-east-1
              secretAccessKey: ${LOKI_S3_SECRET_KEY}
              accessKeyId: ${LOKI_S3_ACCESS_KEY}
              s3ForcePathStyle: true
              insecure: true

          # schema config
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h

          # retention — 30 days
          limits_config:
            retention_period: 720h
            ingestion_rate_mb: 16
            ingestion_burst_size_mb: 32

          # compactor for retention enforcement
          compactor:
            retention_enabled: true
            delete_request_store: s3

        # single binary deployment
        singleBinary:
          replicas: 1

          # S3 credentials from secret
          extraEnv:
            - name: LOKI_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: loki-minio-credentials
                  key: access-key
            - name: LOKI_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: loki-minio-credentials
                  key: secret-key

          persistence:
            enabled: true
            storageClass: longhorn
            size: 5Gi      # cache only — long term in MinIO

          tolerations:
            - key: node-role.kubernetes.io/control-plane
              effect: NoSchedule
              operator: Exists

          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m

        # disable components not needed in single binary mode
        read:
          replicas: 0
        write:
          replicas: 0
        backend:
          replicas: 0

        # Promtail — log shipper DaemonSet
        # Runs on every node, tails pod logs, ships to Loki
        promtail:
          enabled: false   # deploy separately for more control

        # gateway — nginx proxy for Loki API
        gateway:
          enabled: true
          replicas: 1
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              effect: NoSchedule
              operator: Exists

        # metrics
        monitoring:
          serviceMonitor:
            enabled: true
            labels:
              release: prometheus   # matches kube-prometheus-stack selector

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# =============================================================================
# Promtail — ArgoCD Application
# =============================================================================
# DaemonSet that ships pod logs to Loki
# Runs on every node — tails /var/log/pods/*
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: promtail
    targetRevision: 6.16.6
    helm:
      values: |
        config:
          # send to Loki gateway
          clients:
            - url: http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push

          # scrape pod logs with k8s metadata
          snippets:
            pipelineStages:
              - cri: {}

        tolerations:
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule
            operator: Exists

        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 128Mi
            cpu: 200m

        serviceMonitor:
          enabled: true
          labels:
            release: prometheus

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# =============================================================================
# Loki Config — ArgoCD Application
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/darktang3nt69/homelab-gitops
    targetRevision: main
    path: infrastructure/loki
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
