---
# =============================================================================
# External Secrets Operator — ArgoCD Application
# =============================================================================
# ESO bridges Vault → k8s Secrets
# Pods consume standard k8s Secrets — they never talk to Vault directly
# Git never contains secret values — everything flows through Vault → ESO
#
# Flow:
#   Vault (source of truth)
#     ↓ ESO reads from Vault using k8s ServiceAccount auth
#   k8s Secret (ephemeral, auto-refreshed by ESO)
#     ↓ pods consume as env vars or mounted files
#
# Wave 2 — after Vault is running (wave 1)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.12.1
    helm:
      values: |
        # install CRDs as part of chart
        installCRDs: true

        # ESO controller resources
        resources:
          requests:
            cpu: 10m
            memory: 96Mi
          limits:
            cpu: 100m
            memory: 256Mi

        # webhook resources
        webhook:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi

        # cert controller resources
        certController:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi

        # enable prometheus metrics
        serviceMonitor:
          enabled: false   # enable when monitoring stack is deployed

  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# =============================================================================
# ESO Config — ArgoCD Application
# =============================================================================
# Applies ClusterSecretStore (connects ESO to Vault)
# + ExternalSecret for cert-manager Cloudflare token
# Wave 3 — after ESO is running (wave 2)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/darktang3nt69/homelab-gitops
    targetRevision: main
    path: infrastructure/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
