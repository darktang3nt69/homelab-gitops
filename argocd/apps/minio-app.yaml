---
# =============================================================================
# MinIO — ArgoCD Application
# =============================================================================
# Standalone MinIO S3-compatible object storage
# Purpose: Velero + Longhorn + Loki + Tempo backup/storage target
# Storage: HostPath on /mnt/data/minio (HDD — sda)
# Credentials: from Vault via ESO
# Chart: official MinIO chart (not Bitnami — image issues)
#
# Wave 1: MinIO Helm chart
# Wave 2: MinIO config (PVC, ExternalSecret, HTTPRoutes)
#
# IMPORTANT: Before pushing to Git, store credentials in Vault:
#   kubectl exec -it vault-0 -n security -- \
#     vault kv put secret/minio/root-credentials \
#       root-user=minioadmin \
#       root-password=<strong-password>
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.min.io
    chart: minio
    targetRevision: 5.4.0
    helm:
      values: |
        # ── Mode ─────────────────────────────────────────────────────────────
        mode: standalone

        # ── Auth ─────────────────────────────────────────────────────────────
        # credentials from k8s Secret managed by ESO from Vault
        # secret must exist before ArgoCD syncs this app
        existingSecret: minio-credentials

        # ── Storage ──────────────────────────────────────────────────────────
        # use existing PVC backed by HostPath /mnt/data/minio
        # HostPath chosen over Longhorn:
        #   MinIO IS the backup target — must work even if Longhorn fails
        #   No circular dependency (Velero backs up Longhorn using MinIO)
        persistence:
          enabled: true
          existingClaim: minio-data-pvc

        # ── Buckets ──────────────────────────────────────────────────────────
        # created at pod startup automatically
        buckets:
          - name: velero
            policy: none
            purge: false
          - name: longhorn-backups
            policy: none
            purge: false
          - name: loki
            policy: none
            purge: false
          - name: tempo
            policy: none
            purge: false

        # ── Resources ────────────────────────────────────────────────────────
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m

        # ── Services ─────────────────────────────────────────────────────────
        # S3 API — used by Velero, Longhorn, Loki, Tempo
        service:
          type: ClusterIP
          port: 9000

        # Console UI — exposed via HTTPRoute
        consoleService:
          type: ClusterIP
          port: 9001

        # ── Scheduling ───────────────────────────────────────────────────────
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule
            operator: Exists

        # ── Metrics ──────────────────────────────────────────────────────────
        metrics:
          serviceMonitor:
            enabled: false   # enable when kube-prometheus-stack is deployed

  destination:
    server: https://kubernetes.default.svc
    namespace: storage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# =============================================================================
# MinIO Config — ArgoCD Application
# =============================================================================
# Applies PVC, ExternalSecret, HTTPRoutes
# Wave 2 — after MinIO pod is running (wave 1)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/darktang3nt69/homelab-gitops
    targetRevision: main
    path: infrastructure/minio
  destination:
    server: https://kubernetes.default.svc
    namespace: storage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true