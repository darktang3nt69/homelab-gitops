---
# =============================================================================
# Trivy Operator Config — ArgoCD Application
# =============================================================================
# HTTPRoute for Trivy Operator UI ingress + homepage service discovery
# Wave 3: after Trivy Operator chart is deployed (wave 2)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trivy-operator-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/darktang3nt69/homelab-gitops
    targetRevision: main
    path: infrastructure/trivy-operator
  destination:
    server: https://kubernetes.default.svc
    namespace: trivy-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
