---
# =============================================================================
# ArgoCD Config — ArgoCD Application
# =============================================================================
# Manages ArgoCD's own configuration (argocd-cm, etc.) via GitOps.
# Sync wave 0 — runs before everything else.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/darktang3nt69/homelab-gitops
    targetRevision: main
    path: infrastructure/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false      # don't delete argocd-cm if removed from Git
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true