---
# =============================================================================
# Hubble Observer — ArgoCD Application
# =============================================================================
# Runs a hubble CLI pod that connects to hubble-relay and streams all Cilium
# network flows to stdout. Promtail picks them up and ships to Loki.
#
# Grafana dashboard (ID 23862) available at:
#   https://grafana.com/grafana/dashboards/23862
# Import manually in Grafana: Dashboards → Import → enter 23862
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hubble-observer
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: oci://ghcr.io/onzack/helm-charts/hubble-observer
    targetRevision: 2.3.0
    helm:
      values: |
        # Disable Grafana Operator dashboard — we use kube-prometheus-stack sidecar.
        # Import dashboard ID 23862 manually from grafana.com instead.
        grafanaDashboard:
          enabled: false

        hubbleRelay:
          serviceName: hubble-relay
          port: "80"
          namespace: kube-system

        # DROPPED = only log denied/dropped flows (security-focused).
        # Change to "none" to capture all flows (much higher volume).
        verdictFilter: DROPPED

        tolerations:
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule
            operator: Exists

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
