---
# =============================================================================
# Dozzle — ArgoCD Application
# =============================================================================
# Real-time log viewer for Kubernetes pods
# Mode: k8s — reads logs directly from Kubernetes API
# Namespace: monitoring
# URL: dozzle.k8s.darktang3nt.cloud
#
# Docs: https://dozzle.dev/guide/k8s
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dozzle
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/darktang3nt69/homelab-gitops
    targetRevision: main
    path: infrastructure/dozzle
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
