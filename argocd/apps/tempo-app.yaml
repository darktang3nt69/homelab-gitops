---
# =============================================================================
# Tempo — ArgoCD Application
# =============================================================================
# Distributed tracing backend
# Storage: MinIO tempo bucket
# Mode: monolithic (single pod for homelab)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: tempo
    targetRevision: 1.18.3
    helm:
      values: |
        tempo:
          # S3 storage via MinIO
          storage:
            trace:
              backend: s3
              s3:
                bucket: tempo
                endpoint: minio.storage:9000
                region: us-east-1
                insecure: true
                forcepathstyle: true
                access_key: ${TEMPO_S3_ACCESS_KEY}
                secret_key: ${TEMPO_S3_SECRET_KEY}

          # 7 day retention for traces
          retention: 168h

          # receive traces via OTLP
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318

        # S3 credentials from secret
        extraEnv:
          - name: TEMPO_S3_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: tempo-minio-credentials
                key: access-key
          - name: TEMPO_S3_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: tempo-minio-credentials
                key: secret-key

        persistence:
          enabled: true
          storageClassName: longhorn
          size: 5Gi   # WAL cache only — long term in MinIO

        tolerations:
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule
            operator: Exists

        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m

        serviceMonitor:
          enabled: true
          additionalLabels:
            release: prometheus

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# =============================================================================
# Tempo Config — ArgoCD Application
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/darktang3nt69/homelab-gitops
    targetRevision: main
    path: infrastructure/tempo
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
