---
# =============================================================================
# Policy Reporter Config — ArgoCD Application
# =============================================================================
# HTTPRoute for Policy Reporter UI ingress + homepage service discovery
# Wave 4: after Policy Reporter chart is deployed (wave 3)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: policy-reporter-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/darktang3nt69/homelab-gitops
    targetRevision: main
    path: infrastructure/policy-reporter
  destination:
    server: https://kubernetes.default.svc
    namespace: policy-reporter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
